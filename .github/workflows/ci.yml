name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - name: Lint (read-only)
        run: npx biome ci .
      - name: Test
        run: npm test
